services:
  pebbletesla:
    build:
      context: .
      dockerfile: Dockerfile
    image: pebbletesla-server:latest
    restart: unless-stopped
    # Put secrets in ./.env (gitignored). Compose loads it for ${VAR} in `environment` below.
    ports:
      - "${PUBLIC_PORT:-8080}:8080"
      - "${PRIVATE_PORT:-9000}:9000"
    environment:
      PUBLIC_LISTEN: ":8080"
      PRIVATE_LISTEN: "${PRIVATE_LISTEN:-:9000}"
      FLEET_API_BASE: ${FLEET_API_BASE:-https://fleet-api.prd.na.vn.cloud.tesla.com}
      PROXY_PREFIX: ${PROXY_PREFIX:-/proxy}
      PUBLIC_CALLBACK_PATH: ${PUBLIC_CALLBACK_PATH:-/oauth/redirect}
      PUBLIC_KEY_PATH: ${PUBLIC_KEY_PATH:-/.well-known/appspecific/com.tesla.3p.public-key.pem}
      SHARED_SECRET: ${SHARED_SECRET:-}
      TOKEN_FILE: ${TOKEN_FILE:-/tesla-fleet-keys/tokens.json}
      PUBLIC_KEY_FILE: ${PUBLIC_KEY_FILE:-/tesla-fleet-keys/com.tesla.3p.public-key.pem}
    volumes:
      - ./tesla-fleet-keys:/tesla-fleet-keys
